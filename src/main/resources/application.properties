# ===============================
# CONNESSIONE AL DATABASE MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/smartmall?serverTimezone=UTC
spring.datasource.username=root
# La password viene letta dalle variabili d'ambiente
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURAZIONE JPA / HIBERNATE
# ===============================
# Aggiornamento delle tabelle automatico
spring.jpa.hibernate.ddl-auto=update

# Mostra le query SQL nella console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# CONFIGURAZIONE JWT
# ===============================
# La chiave segreta viene letta dalle variabili d'ambiente
jwt.secret=${JWT_SECRET}
# Scadenza del token (es. 24 ore in millisecondi: 86400000)
jwt.expiration=86400000